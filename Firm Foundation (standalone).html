  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ick=\"selMin(this)\">10 min<\u002Fdiv>\n          <div class=\"ci-min-btn\" data-min=\"15\" onclick=\"selMin(this)\">15 min<\u002Fdiv>\n          <div class=\"ci-min-btn\" data-min=\"20\" onclick=\"selMin(this)\">20 min<\u002Fdiv>\n          <div class=\"ci-min-btn\" data-min=\"30\" onclick=\"selMin(this)\">30 min<\u002Fdiv>\n          <div class=\"ci-min-btn\" data-min=\"45\" onclick=\"selMin(this)\">45 min<\u002Fdiv>\n          <div class=\"ci-min-btn\" id=\"ci-custom-chip\" onclick=\"showCustomMin(this)\">Custom<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ci-custom-wrap\" id=\"ci-custom-wrap\">\n          <input type=\"number\" class=\"ci-input\" id=\"ci-custom-val\" placeholder=\"Enter minutes…\" min=\"1\" max=\"240\" style=\"margin-bottom:0;\">\n        <\u002Fdiv>\n        <button class=\"ci-next\" style=\"margin-top:auto;\" onclick=\"nextStep(3)\">Continue<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"ci-step\" id=\"ci-3\">\n        <div class=\"ci-step-num\">Step 3 of 6<\u002Fdiv>\n        <div class=\"ci-q\">Three things<br>you're grateful for<\u002Fdiv>\n        <input class=\"ci-input\" id=\"ci-g1\" type=\"text\" placeholder=\"1. I'm grateful for…\">\n        <input class=\"ci-input\" id=\"ci-g2\" type=\"text\" placeholder=\"2. I'm grateful for…\">\n        <input class=\"ci-input\" id=\"ci-g3\" type=\"text\" placeholder=\"3. I'm grateful for…\">\n        <button class=\"ci-next\" onclick=\"nextStep(4)\">Continue<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"ci-step\" id=\"ci-4\">\n        <div class=\"ci-step-num\">Step 4 of 6<\u002Fdiv>\n        <div class=\"ci-q\">What's your<br>intention today?<\u002Fdiv>\n        <textarea class=\"ci-textarea\" id=\"ci-intent\" placeholder=\"How do you want to show up? One sentence.\"><\u002Ftextarea>\n        <button class=\"ci-next\" onclick=\"nextStep(5)\">Continue<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"ci-step\" id=\"ci-5\">\n        <div class=\"ci-step-num\">Step 5 of 6<\u002Fdiv>\n        <div class=\"ci-q\">Name your<br>3 priorities<\u002Fdiv>\n        <input class=\"ci-input\" id=\"ci-p1\" type=\"text\" placeholder=\"Priority 1 — the most important thing\">\n        <input class=\"ci-input\" id=\"ci-p2\" type=\"text\" placeholder=\"Priority 2\">\n        <input class=\"ci-input\" id=\"ci-p3\" type=\"text\" placeholder=\"Priority 3\">\n        <button class=\"ci-next\" onclick=\"nextStep(6)\">Continue<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"ci-step\" id=\"ci-6\">\n        <div class=\"ci-step-num\">Step 6 of 6<\u002Fdiv>\n        <div class=\"ci-q\">Scripture<br>read today?<\u002Fdiv>\n        <div class=\"ci-toggle-row\"><div class=\"ci-toggle-label\">Mark scripture as read<\u002Fdiv><div class=\"sw-track on\" id=\"ci-scripture-sw\" onclick=\"toggleSw(this)\"><div class=\"sw-knob\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;\"><\u002Fdiv>\n        <button class=\"ci-next\" onclick=\"submitCheckin()\" style=\"background:var(--green);color:#fff;\">Complete Check-in ✓<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ ADD/EDIT ITEM MODAL (Non-Negotiables, Disciplines, Verses) ═══ -->\n    <div class=\"modal\" id=\"item-modal\">\n      <div class=\"modal-bar\">\n        <button class=\"modal-close\" onclick=\"closeItemModal()\">✕<\u002Fbutton>\n        <div class=\"modal-title\" id=\"item-modal-title\">New Item<\u002Fdiv>\n        <div style=\"width:32px;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"simple-body\">\n        <div class=\"simple-q\" id=\"item-q\">New entry<\u002Fdiv>\n        <div class=\"simple-sub\" id=\"item-sub\">—<\u002Fdiv>\n        <!-- Non-negotiable / discipline title -->\n        <div id=\"item-title-wrap\">\n          <div class=\"field-lbl\" id=\"item-title-lbl\">Title<\u002Fdiv>\n          <input class=\"ci-input\" type=\"text\" id=\"item-title-input\" placeholder=\"e.g. Word &amp; Prayer\">\n        <\u002Fdiv>\n        <!-- discipline subtitle -->\n        <div id=\"item-subtitle-wrap\" style=\"display:none;\">\n          <div class=\"field-lbl\">Subtitle (optional)<\u002Fdiv>\n          <input class=\"ci-input\" type=\"text\" id=\"item-subtitle-input\" placeholder=\"e.g. Daily reading complete\">\n        <\u002Fdiv>\n        <!-- verse ref -->\n        <div id=\"item-ref-wrap\" style=\"display:none;\">\n          <div class=\"field-lbl\">Reference<\u002Fdiv>\n          <input class=\"ci-input\" type=\"text\" id=\"item-ref-input\" placeholder=\"e.g. Romans 8:28\">\n        <\u002Fdiv>\n        <!-- verse text -->\n        <div id=\"item-text-wrap\" style=\"display:none;\">\n          <div class=\"field-lbl\">Verse<\u002Fdiv>\n          <textarea class=\"ci-textarea\" id=\"item-text-input\" style=\"min-height:130px;flex:0 0 auto;\" placeholder=\"Type or paste the verse…\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <button class=\"modal-primary-btn\" id=\"item-save-btn\" onclick=\"saveItem()\">Save<\u002Fbutton>\n        <button class=\"modal-primary-btn red\" id=\"item-delete-btn\" style=\"display:none;\" onclick=\"deleteItem()\">Delete<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ ADD PRAYER MODAL ═══ -->\n    <div class=\"modal\" id=\"prayer-modal\">\n      <div class=\"modal-bar\">\n        <button class=\"modal-close\" onclick=\"closeAddPrayer()\">✕<\u002Fbutton>\n        <div class=\"modal-title\">New Prayer<\u002Fdiv>\n        <div style=\"width:32px;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"simple-body\">\n        <div class=\"simple-q\">What are you<br>praying for?<\u002Fdiv>\n        <div class=\"simple-sub\">Cast it on Him. He's listening, and He'll move.<\u002Fdiv>\n        <textarea class=\"ci-textarea\" id=\"new-prayer-text\" placeholder=\"Lord, I'm asking…\" style=\"min-height:160px;\"><\u002Ftextarea>\n        <button class=\"modal-primary-btn\" onclick=\"savePrayer()\">Save Prayer<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ MARK ANSWERED MODAL ═══ -->\n    <div class=\"modal\" id=\"answered-modal\">\n      <div class=\"modal-bar\">\n        <button class=\"modal-close\" onclick=\"closeAnsweredModal()\">✕<\u002Fbutton>\n        <div class=\"modal-title\">Mark Answered<\u002Fdiv>\n        <div style=\"width:32px;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"simple-body\">\n        <div class=\"simple-q\">How did<br>He answer?<\u002Fdiv>\n        <div class=\"simple-sub\">Write it down. Build the wall. You'll need to remember on the dark days.<\u002Fdiv>\n        <div class=\"field-lbl\">Original prayer<\u002Fdiv>\n        <div id=\"answered-orig-prayer\" style=\"font-style:italic;color:var(--ts);font-size:13px;line-height:1.55;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;\"><\u002Fdiv>\n        <div class=\"field-lbl\">His answer<\u002Fdiv>\n        <textarea class=\"ci-textarea\" id=\"answer-text\" placeholder=\"What happened? When? How did you know it was Him?\" style=\"min-height:130px;\"><\u002Ftextarea>\n        <button class=\"modal-primary-btn green\" onclick=\"confirmAnswered()\">Mark Answered ✓<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ═══════════════════════════════════════════════════════════════════\n// VERSE-OF-THE-DAY ROTATION POOL (system-curated; separate from user's saved verses)\n// ═══════════════════════════════════════════════════════════════════\nconst VERSES_POOL = [\n  {ref:\"Psalm 46:10\", text:\"Be still and know that I am God.\"},\n  {ref:\"Phil 4:13\", text:\"I can do all things through Christ who strengthens me.\"},\n  {ref:\"Joshua 1:9\", text:\"Be strong and courageous. Do not be afraid; do not be discouraged.\"},\n  {ref:\"Prov 3:5-6\", text:\"Trust in the Lord with all your heart and lean not on your own understanding.\"},\n  {ref:\"Romans 8:28\", text:\"In all things God works for the good of those who love him.\"},\n  {ref:\"Isaiah 40:31\", text:\"Those who hope in the Lord will renew their strength.\"},\n  {ref:\"James 1:2-3\", text:\"Consider it pure joy whenever you face trials of many kinds.\"},\n  {ref:\"Jer 29:11\", text:\"For I know the plans I have for you, declares the Lord.\"},\n  {ref:\"Matt 6:33\", text:\"Seek first his kingdom and his righteousness, and all these things will be given to you.\"},\n  {ref:\"Gal 5:22-23\", text:\"The fruit of the Spirit is love, joy, peace, patience, kindness, goodness, faithfulness, gentleness and self-control.\"},\n  {ref:\"1 Cor 16:13\", text:\"Be on your guard; stand firm in the faith; be courageous; be strong.\"},\n  {ref:\"Heb 12:1\", text:\"Let us run with perseverance the race marked out for us.\"},\n  {ref:\"2 Tim 1:7\", text:\"For God has not given us a spirit of timidity, but of power, love and self-discipline.\"},\n  {ref:\"Prov 27:17\", text:\"As iron sharpens iron, so one person sharpens another.\"},\n  {ref:\"Micah 6:8\", text:\"Act justly, love mercy, and walk humbly with your God.\"},\n  {ref:\"Romans 12:2\", text:\"Do not conform to the pattern of this world, but be transformed by the renewing of your mind.\"},\n  {ref:\"Eph 6:10\", text:\"Be strong in the Lord and in his mighty power.\"},\n  {ref:\"Col 3:23\", text:\"Whatever you do, work at it with all your heart, as working for the Lord.\"},\n  {ref:\"1 Tim 4:8\", text:\"Physical training has some value, but godliness has value for all things.\"},\n  {ref:\"Psalm 27:1\", text:\"The Lord is my light and my salvation — whom shall I fear?\"},\n  {ref:\"Rom 5:3-4\", text:\"We also glory in our sufferings, because suffering produces perseverance; perseverance, character; and character, hope.\"},\n  {ref:\"1 Pet 5:8\", text:\"Be sober-minded; be watchful. Your adversary the devil prowls around like a roaring lion.\"},\n  {ref:\"Dan 1:8\", text:\"Daniel resolved not to defile himself.\"},\n  {ref:\"Prov 4:23\", text:\"Above all else, guard your heart, for everything you do flows from it.\"},\n  {ref:\"Matt 5:16\", text:\"Let your light shine before others, that they may see your good deeds and glorify your Father in heaven.\"},\n  {ref:\"Psalm 119:11\", text:\"I have hidden your word in my heart that I might not sin against you.\"},\n  {ref:\"Heb 10:24\", text:\"Let us consider how we may spur one another on toward love and good deeds.\"},\n  {ref:\"John 15:5\", text:\"I am the vine; you are the branches. Apart from me you can do nothing.\"},\n  {ref:\"Lam 3:22-23\", text:\"His mercies are new every morning; great is your faithfulness.\"},\n  {ref:\"Psalm 1:1-2\", text:\"Blessed is the man who does not walk in the counsel of the wicked.\"}\n];\n\n// ═══════════════════════════════════════════════════════════════════\n// STORAGE\n// ═══════════════════════════════════════════════════════════════════\nconst ls = {\n  get(k, d){ try{ const v=localStorage.getItem(k); return v===null?d:JSON.parse(v); }catch(e){ return d; } },\n  set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }\n};\nconst todayStr = () => new Date().toDateString();\nconst yesterdayStr = () => new Date(Date.now()-86400000).toDateString();\nconst uid = () => 'i'+Date.now()+Math.random().toString(36).slice(2,7);\n\n// ═══════════════════════════════════════════════════════════════════\n// STATE  (all persisted to localStorage)\n// ═══════════════════════════════════════════════════════════════════\nlet state = {\n  streak:        ls.get('ff_streak', 47),\n  lastCheckin:   ls.get('ff_last_checkin', null),\n\n  // Today's priorities\n  priorities:    ls.get('ff_priorities', [\n    \"Complete Q2 product roadmap review with engineering leads\",\n    \"45-minute lift session — upper body push focus\",\n    \"Call Mom — been two weeks\"\n  ]),\n  priorityChecks:ls.get('ff_priority_checks', [false, true, false]),\n\n  // CRUD: Non-Negotiables\n  nonneg:        ls.get('ff_nonneg_v2', [\n    {id:uid(), text:\"Word & Prayer\", done:true},\n    {id:uid(), text:\"Train or Move\", done:true},\n    {id:uid(), text:\"No Alcohol\", done:false},\n    {id:uid(), text:\"Serve Someone\", done:false}\n  ]),\n\n  // CRUD: Spiritual Disciplines\n  disciplines:   ls.get('ff_disciplines_v2', [\n    {id:uid(), title:\"Scripture Read\", sub:\"Mark today's reading complete\", on:true},\n    {id:uid(), title:\"Fasting Today\",  sub:\"Intermittent · 18:6 · 4 hrs remaining\", on:true},\n    {id:uid(), title:\"Tithing\",        sub:\"Weekly giving committed\", on:false}\n  ]),\n\n  // CRUD: Saved Verses (user-owned library)\n  verses:        ls.get('ff_verses_v2', [\n    {id:uid(), ref:\"Jer 29:11\", text:\"\\\"For I know the plans I have for you,\\\" declares the Lord.\"},\n    {id:uid(), ref:\"Isaiah 40:31\", text:\"Those who hope in the Lord will renew their strength.\"},\n    {id:uid(), ref:\"Prov 3:5-6\", text:\"Trust in the Lord with all your heart and lean not on your own understanding.\"},\n    {id:uid(), ref:\"James 1:2-3\", text:\"Consider it pure joy whenever you face trials of many kinds.\"}\n  ]),\n\n  prayers:       ls.get('ff_prayers', [\n    {id:'seed1', date:'May 5', dateMs:Date.now()-2*86400000, text:\"Help me be consistent — in my health, in my relationships, in my word. I want to be a man of my word.\", status:'active'},\n    {id:'seed2', date:'May 1', dateMs:Date.now()-6*86400000, text:\"Pray for Dad's health. The diagnosis scared all of us. I trust you, Lord, but I need your strength right now to keep trusting.\", status:'active'},\n    {id:'seed3', date:'Apr 22', dateMs:Date.now()-15*86400000, text:\"Lord, give me clarity on whether to take the leadership role at work. I need your peace to guide me.\", status:'answered', answeredText:\"Got the call Thursday. Felt an overwhelming peace — accepted. He was already ahead of me.\", answeredDate:'May 2', answeredMs:Date.now()-5*86400000}\n  ]),\n\n  prayerMin:     ls.get('ff_prayer_min', 12),\n  prayerGoal:    ls.get('ff_prayer_goal', 20),\n\n  // WHOOP integration\n  whoop: ls.get('ff_whoop', {\n    connected: true,\n    recovery: 83,\n    lastSync: '8:47 AM',\n    error: null\n  }),\n\n  memberSince:   ls.get('ff_member_since', 'Jan 2025'),\n};\n\nfunction persist(){\n  ls.set('ff_streak', state.streak);\n  ls.set('ff_last_checkin', state.lastCheckin);\n  ls.set('ff_priorities', state.priorities);\n  ls.set('ff_priority_checks', state.priorityChecks);\n  ls.set('ff_nonneg_v2', state.nonneg);\n  ls.set('ff_disciplines_v2', state.disciplines);\n  ls.set('ff_verses_v2', state.verses);\n  ls.set('ff_prayers', state.prayers);\n  ls.set('ff_prayer_min', state.prayerMin);\n  ls.set('ff_prayer_goal', state.prayerGoal);\n  ls.set('ff_whoop', state.whoop);\n  ls.set('ff_member_since', state.memberSince);\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// WHOOP API HOOK (OAuth 2.0 placeholder)\n// ═══════════════════════════════════════════════════════════════════\n//\n// Real implementation reference:\n//   1. Register OAuth app at https://developer.whoop.com → get CLIENT_ID\n//   2. Auth flow:    GET https://api.prod.whoop.com/oauth/oauth2/auth\n//                    ?client_id=...&redirect_uri=...&response_type=code\n//                    &scope=read:recovery%20read:sleep%20read:profile\n//   3. Exchange:     POST https://api.prod.whoop.com/oauth/oauth2/token\n//                    {grant_type:'authorization_code', code, client_id, client_secret, redirect_uri}\n//                    → {access_token, refresh_token, expires_in}\n//   4. Store tokens in secure backend; refresh access_token before expiry.\n//   5. Fetch:        GET https://api.prod.whoop.com/developer/v1/recovery\n//                    Authorization: Bearer <access_token>\n//                    → {records:[{score:{recovery_score, hrv_rmssd_milli, resting_heart_rate}}]}\n//\n// In this MVP, fetchWhoopRecovery() returns a simulated value.\n// ═══════════════════════════════════════════════════════════════════\n\nconst WHOOP_CONFIG = {\n  CLIENT_ID:    'YOUR_WHOOP_CLIENT_ID',           // ← set in production\n  REDIRECT_URI: 'https://app.firmfoundation.com/oauth/whoop/callback',\n  SCOPES:       ['read:recovery','read:sleep','read:profile','read:cycles'],\n  AUTH_URL:     'https://api.prod.whoop.com/oauth/oauth2/auth',\n  TOKEN_URL:    'https://api.prod.whoop.com/oauth/oauth2/token',\n  API_BASE:     'https://api.prod.whoop.com/developer/v1'\n};\n\nasync function fetchWhoopRecovery(){\n  // ─── PRODUCTION (uncomment when wired to backend) ───\n  // const tok = ls.get('ff_whoop_token', null);\n  // if(!tok || Date.now() > tok.expiresAt){\n  //   await refreshWhoopToken();\n  // }\n  // const res = await fetch(`${WHOOP_CONFIG.API_BASE}/recovery?limit=1`, {\n  //   headers: { 'Authorization': `Bearer ${tok.accessToken}` }\n  // });\n  // if(!res.ok) throw new Error('WHOOP API error: '+res.status);\n  // const data = await res.json();\n  // const rec = data.records[0]?.score;\n  // return {\n  //   recovery: Math.round(rec.recovery_score),\n  //   hrv:      Math.round(rec.hrv_rmssd_milli),\n  //   restingHr:Math.round(rec.resting_heart_rate),\n  //   when:     new Date(data.records[0].created_at).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})\n  // };\n\n  // ─── MOCK (returns realistic value w/ ±5% jitter) ───\n  await new Promise(r => setTimeout(r, 700));\n  const base = state.whoop.recovery || 83;\n  const jitter = Math.round((Math.random()-0.5)*10);\n  const recovery = Math.max(0, Math.min(100, base + jitter));\n  return {\n    recovery,\n    hrv: 68,\n    restingHr: 52,\n    when: new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})\n  };\n}\n\nasync function syncWhoop(){\n  const chip = document.getElementById('whoop-chip');\n  const chipText = document.getElementById('whoop-chip-text');\n  chip.classList.remove('error');\n  chipText.textContent = 'WHOOP · Syncing…';\n  try{\n    const data = await fetchWhoopRecovery();\n    state.whoop.recovery = data.recovery;\n    state.whoop.lastSync = data.when;\n    state.whoop.error = null;\n    state.whoop.connected = true;\n    persist();\n    renderWhoop();\n    animateRings();\n  } catch(e){\n    state.whoop.error = e.message || 'Sync failed';\n    chip.classList.add('error');\n    chipText.textContent = 'WHOOP · Reconnect';\n  }\n}\n\nfunction renderWhoop(){\n  const chipText = document.getElementById('whoop-chip-text');\n  if(state.whoop.error){\n    document.getElementById('whoop-chip').classList.add('error');\n    chipText.textContent = 'WHOOP · Reconnect';\n  } else {\n    document.getElementById('whoop-chip').classList.remove('error');\n    chipText.textContent = `WHOOP · Synced ${state.whoop.lastSync || ''}`.trim();\n  }\n  const rec = state.whoop.recovery;\n  document.getElementById('hs-recovery').textContent = rec;\n  document.getElementById('hs-recovery-sub').textContent = recoveryLabel(rec);\n  const dot = document.getElementById('hs-recovery-dot');\n  const c = recoveryColor(rec);\n  dot.style.background = c;\n  dot.style.boxShadow = `0 0 5px ${c}`;\n  document.getElementById('whoop-bnr-sub').textContent = `Recovery ${rec}% · Last sync ${state.whoop.lastSync}`;\n}\n\n// WHOOP color thresholds (matches their app: <34 red, 34-66 yellow, ≥67 green)\nfunction recoveryColor(v){\n  if(v >= 67) return '#27AE60';\n  if(v >= 34) return '#F39C12';\n  return '#E74C3C';\n}\nfunction recoveryLabel(v){\n  if(v >= 67) return 'Optimal';\n  if(v >= 34) return 'Adequate';\n  return 'Compromised';\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// DERIVED RING VALUES\n// ═══════════════════════════════════════════════════════════════════\nfunction spiritPct(){\n  // Spirit ring = % of disciplines on + prayer goal hit\n  const items = state.disciplines;\n  const onCount = items.filter(d=>d.on).length;\n  const prayerHit = state.prayerMin >= state.prayerGoal ? 1 : 0;\n  const total = items.length + 1;\n  if(total === 0) return 0;\n  return Math.round(((onCount + prayerHit) / total) * 100);\n}\nfunction mindPct(){\n  // Mind = % of non-negotiables done (mental fortitude / consistency)\n  if(!state.nonneg.length) return 0;\n  const done = state.nonneg.filter(n=>n.done).length;\n  return Math.round((done / state.nonneg.length) * 100);\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// TAB SWITCHING\n// ═══════════════════════════════════════════════════════════════════\nfunction switchTab(id, btn){\n  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));\n  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));\n  document.getElementById('s-'+id).classList.add('active');\n  if(btn) btn.classList.add('active');\n  ls.set('ff_tab', id);\n  try{ window.parent.postMessage({slideIndexChanged: ['today','spirit','journal','profile'].indexOf(id)}, '*'); }catch(e){}\n}\nfunction switchJTab(t){\n  const pid = t.dataset.pane;\n  document.querySelectorAll('.j-tab').forEach(x=>x.classList.remove('active'));\n  document.querySelectorAll('.j-pane').forEach(p=>p.classList.remove('active'));\n  t.classList.add('active');\n  document.getElementById(pid)?.classList.add('active');\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// PRIORITIES\n// ═══════════════════════════════════════════════════════════════════\nfunction renderPriorities(){\n  const wrap = document.getElementById('priorities-list');\n  wrap.innerHTML = '';\n  state.priorities.forEach((text, i) => {\n    const checked = state.priorityChecks[i];\n    const div = document.createElement('div');\n    div.className = 'priority-row';\n    div.innerHTML = `\n      <div class=\"p-num\">${i+1}<\u002Fdiv>\n      <div class=\"p-text${text?'':' empty'}\">${escapeHtml(text || 'Not set — complete morning check-in')}<\u002Fdiv>\n      <div class=\"p-box${checked?' checked':''}\" onclick=\"togglePriority(${i})\">${checked?'<svg width=\"12\" height=\"9\" viewBox=\"0 0 12 9\" fill=\"none\"><path d=\"M1 4L4.5 8L11 1\" stroke=\"#080B14\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>':''}<\u002Fdiv>`;\n    wrap.appendChild(div);\n  });\n}\nfunction togglePriority(i){\n  state.priorityChecks[i] = !state.priorityChecks[i];\n  persist();\n  renderPriorities();\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// CRUD: NON-NEGOTIABLES\n// ═══════════════════════════════════════════════════════════════════\nfunction renderNonneg(){\n  const wrap = document.getElementById('nonneg-list');\n  wrap.innerHTML = '';\n  if(!state.nonneg.length){\n    wrap.innerHTML = '<div class=\"empty-list\">No non-negotiables yet. Tap + Add to commit.<\u002Fdiv>';\n    return;\n  }\n  state.nonneg.forEach(item => {\n    const div = document.createElement('div');\n    div.className = 'nn-item';\n    const chk = item.done\n      ? '<svg width=\"12\" height=\"9\" viewBox=\"0 0 12 9\" fill=\"none\"><path d=\"M1 4L4.5 8L11 1\" stroke=\"#080B14\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>'\n      : '';\n    div.innerHTML = `\n      <div class=\"nn-dot\"><\u002Fdiv>\n      <div class=\"nn-text\" onclick=\"openItemModal('nonneg','${item.id}')\">${escapeHtml(item.text)}<\u002Fdiv>\n      <div class=\"row-actions\">\n        <button class=\"row-icon-btn del\" onclick=\"deleteItemDirect('nonneg','${item.id}')\" title=\"Delete\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2.5 4h9M5 4V2.5h4V4M3.8 4l.6 8h5.2l.6-8M5.5 6.5v3M8.5 6.5v3\"/><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"nn-chk${item.done?' done':''}\" onclick=\"toggleNonneg('${item.id}')\">${chk}<\u002Fdiv>\n      <\u002Fdiv>`;\n    wrap.appendChild(div);\n  });\n}\nfunction toggleNonneg(id){\n  const it = state.nonneg.find(x=>x.id===id);\n  if(!it) return;\n  it.done = !it.done;\n  persist();\n  renderNonneg();\n  animateRings();\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// CRUD: SPIRITUAL DISCIPLINES\n// ═══════════════════════════════════════════════════════════════════\nfunction renderDisciplines(){\n  const wrap = document.getElementById('disc-list');\n  wrap.innerHTML = '';\n  if(!state.disciplines.length){\n    wrap.innerHTML = '<div class=\"empty-list\">No disciplines yet. Tap + Add to start.<\u002Fdiv>';\n    return;\n  }\n  state.disciplines.forEach(d => {\n    const div = document.createElement('div');\n    div.className = 'disc-item';\n    div.innerHTML = `\n      <div class=\"disc-body\" onclick=\"openItemModal('disc','${d.id}')\">\n        <div class=\"disc-title\">${escapeHtml(d.title)}<\u002Fdiv>\n        ${d.sub ? `<div class=\"disc-sub\">${escapeHtml(d.sub)}<\u002Fdiv>` : ''}\n      <\u002Fdiv>\n      <button class=\"row-icon-btn del\" onclick=\"deleteItemDirect('disc','${d.id}')\" title=\"Delete\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2.5 4h9M5 4V2.5h4V4M3.8 4l.6 8h5.2l.6-8M5.5 6.5v3M8.5 6.5v3\"/><\u002Fsvg>\n      <\u002Fbutton>\n      <div class=\"sw-track${d.on?' on':''}\" onclick=\"toggleDiscipline('${d.id}')\"><div class=\"sw-knob\"><\u002Fdiv><\u002Fdiv>`;\n    wrap.appendChild(div);\n  });\n}\nfunction toggleDiscipline(id){\n  const d = state.disciplines.find(x=>x.id===id);\n  if(!d) return;\n  d.on = !d.on;\n  persist();\n  renderDisciplines();\n  animateRings();\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// CRUD: SAVED VERSES\n// ═══════════════════════════════════════════════════════════════════\nfunction renderVerses(){\n  const wrap = document.getElementById('verses-list');\n  wrap.innerHTML = '';\n  if(!state.verses.length){\n    wrap.innerHTML = '<div class=\"empty-list\">No verses saved. Tap + Add to build your library.<\u002Fdiv>';\n    return;\n  }\n  state.verses.forEach(v => {\n    const div = document.createElement('div');\n    div.className = 'verse-item';\n    div.innerHTML = `\n      <div class=\"verse-body\" onclick=\"openItemModal('verse','${v.id}')\">\n        <div class=\"verse-item-ref\">${escapeHtml(v.ref)}<\u002Fdiv>\n        <div class=\"verse-item-text\">${escapeHtml(v.text)}<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"row-icon-btn del\" onclick=\"deleteItemDirect('verse','${v.id}')\" title=\"Delete\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2.5 4h9M5 4V2.5h4V4M3.8 4l.6 8h5.2l.6-8M5.5 6.5v3M8.5 6.5v3\"/><\u002Fsvg>\n      <\u002Fbutton>`;\n    wrap.appendChild(div);\n  });\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// SHARED ADD/EDIT MODAL — handles all three CRUD lists\n// ═══════════════════════════════════════════════════════════════════\nlet editing = { kind:null, id:null };\nconst ITEM_CONFIG = {\n  nonneg: {\n    title: 'Non-Negotiable',\n    addQ:  'New<br>Non-Negotiable',\n    editQ: 'Edit<br>Non-Negotiable',\n    sub:   'A daily commitment you do not break.',\n    fields:['title']\n  },\n  disc: {\n    title: 'Discipline',\n    addQ:  'New Spiritual<br>Discipline',\n    editQ: 'Edit<br>Discipline',\n    sub:   'A practice that shapes the soul.',\n    fields:['title','sub']\n  },\n  verse: {\n    title: 'Saved Verse',\n    addQ:  'New<br>Saved Verse',\n    editQ: 'Edit<br>Saved Verse',\n    sub:   'Words to hide in your heart.',\n    fields:['ref','text']\n  }\n};\n\nfunction openItemModal(kind, id){\n  editing = { kind, id: id || null };\n  const cfg = ITEM_CONFIG[kind];\n  document.getElementById('item-modal-title').textContent = id ? `Edit ${cfg.title}` : `New ${cfg.title}`;\n  document.getElementById('item-q').innerHTML = id ? cfg.editQ : cfg.addQ;\n  document.getElementById('item-sub').textContent = cfg.sub;\n\n  // Reset all field wraps\n  document.getElementById('item-title-wrap').style.display    = cfg.fields.includes('title') ? 'block' : 'none';\n  document.getElementById('item-subtitle-wrap').style.display = cfg.fields.includes('sub')   ? 'block' : 'none';\n  document.getElementById('item-ref-wrap').style.display      = cfg.fields.includes('ref')   ? 'block' : 'none';\n  document.getElementById('item-text-wrap').style.display     = cfg.fields.includes('text')  ? 'block' : 'none';\n\n  // Field labels & placeholders\n  if(kind === 'nonneg'){\n    document.getElementById('item-title-lbl').textContent = 'Commitment';\n    document.getElementById('item-title-input').placeholder = 'e.g. Word & Prayer';\n  } else if(kind === 'disc'){\n    document.getElementById('item-title-lbl').textContent = 'Discipline';\n    document.getElementById('item-title-input').placeholder = 'e.g. Scripture Read';\n  }\n\n  // Pre-fill if editing\n  document.getElementById('item-title-input').value = '';\n  document.getElementById('item-subtitle-input').value = '';\n  document.getElementById('item-ref-input').value = '';\n  document.getElementById('item-text-input').value = '';\n\n  if(id){\n    let item;\n    if(kind === 'nonneg') item = state.nonneg.find(x=>x.id===id);\n    if(kind === 'disc')   item = state.disciplines.find(x=>x.id===id);\n    if(kind === 'verse')  item = state.verses.find(x=>x.id===id);\n    if(item){\n      if(kind === 'nonneg') document.getElementById('item-title-input').value = item.text || '';\n      if(kind === 'disc'){\n        document.getElementById('item-title-input').value = item.title || '';\n        document.getElementById('item-subtitle-input').value = item.sub || '';\n      }\n      if(kind === 'verse'){\n        document.getElementById('item-ref-input').value = item.ref || '';\n        document.getElementById('item-text-input').value = item.text || '';\n      }\n    }\n    document.getElementById('item-delete-btn').style.display = 'block';\n  } else {\n    document.getElementById('item-delete-btn').style.display = 'none';\n  }\n\n  document.getElementById('item-modal').classList.add('open');\n  setTimeout(() => {\n    const firstField = kind === 'verse'\n      ? document.getElementById('item-ref-input')\n      : document.getElementById('item-title-input');\n    firstField?.focus();\n  }, 200);\n}\n\nfunction closeItemModal(){\n  document.getElementById('item-modal').classList.remove('open');\n  editing = { kind:null, id:null };\n}\n\nfunction saveItem(){\n  const { kind, id } = editing;\n  if(!kind) return;\n\n  if(kind === 'nonneg'){\n    const text = document.getElementById('item-title-input').value.trim();\n    if(!text){ document.getElementById('item-title-input').focus(); return; }\n    if(id){\n      const it = state.nonneg.find(x=>x.id===id);\n      if(it) it.text = text;\n    } else {\n      state.nonneg.push({id:uid(), text, done:false});\n    }\n    persist(); renderNonneg(); animateRings();\n  }\n  else if(kind === 'disc'){\n    const title = document.getElementById('item-title-input').value.trim();\n    const sub   = document.getElementById('item-subtitle-input').value.trim();\n    if(!title){ document.getElementById('item-title-input').focus(); return; }\n    if(id){\n      const it = state.disciplines.find(x=>x.id===id);\n      if(it){ it.title = title; it.sub = sub; }\n    } else {\n      state.disciplines.push({id:uid(), title, sub, on:false});\n    }\n    persist(); renderDisciplines(); animateRings();\n  }\n  else if(kind === 'verse'){\n    const ref  = document.getElementById('item-ref-input').value.trim();\n    const text = document.getElementById('item-text-input').value.trim();\n    if(!ref){  document.getElementById('item-ref-input').focus(); return; }\n    if(!text){ document.getElementById('item-text-input').focus(); return; }\n    if(id){\n      const it = state.verses.find(x=>x.id===id);\n      if(it){ it.ref = ref; it.text = text; }\n    } else {\n      state.verses.push({id:uid(), ref, text});\n    }\n    persist(); renderVerses();\n  }\n  closeItemModal();\n}\n\nfunction deleteItem(){\n  const { kind, id } = editing;\n  if(!kind || !id) return;\n  deleteItemDirect(kind, id);\n  closeItemModal();\n}\n\nfunction deleteItemDirect(kind, id){\n  if(kind === 'nonneg')  state.nonneg = state.nonneg.filter(x=>x.id!==id);\n  if(kind === 'disc')    state.disciplines = state.disciplines.filter(x=>x.id!==id);\n  if(kind === 'verse')   state.verses = state.verses.filter(x=>x.id!==id);\n  persist();\n  renderNonneg(); renderDisciplines(); renderVerses();\n  animateRings();\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// RING ANIMATIONS\n// ═══════════════════════════════════════════════════════════════════\nconst RING_CIRC = 2*Math.PI*72, RING_TRACK = RING_CIRC*300/360;\n\nfunction animateRings(){\n  const bodyVal = state.whoop.recovery;\n  const targets = {\n    'arc-body': bodyVal/100,\n    'arc-spirit': spiritPct()/100,\n    'arc-mind': mindPct()/100\n  };\n  const labels = {\n    'arc-body': 'ring-body-val',\n    'arc-spirit': 'ring-spirit-val',\n    'arc-mind': 'ring-mind-val'\n  };\n\n  // Body ring color (WHOOP gradient)\n  const bodyColor = recoveryColor(bodyVal);\n  const bodyArc = document.getElementById('arc-body');\n  if(bodyArc){\n    bodyArc.setAttribute('stroke', bodyColor);\n  }\n  document.getElementById('ring-body-val').style.color = bodyColor;\n  // also update body glow halo to match\n  const glow = document.getElementById('body-glow');\n  if(glow){\n    const r = parseInt(bodyColor.slice(1,3),16),\n          g = parseInt(bodyColor.slice(3,5),16),\n          b = parseInt(bodyColor.slice(5,7),16);\n    glow.style.background = `radial-gradient(circle,rgba(${r},${g},${b},0.18) 0%,transparent 65%)`;\n  }\n\n  Object.keys(targets).forEach((id, i) => {\n    const el = document.getElementById(id);\n    if(!el) return;\n    const tgt = RING_TRACK * targets[id];\n    const lblEl = document.getElementById(labels[id]);\n    const tgtVal = Math.round(targets[id]*100);\n    setTimeout(() => {\n      requestAnimationFrame(function(ts0){\n        (function anim(ts){\n          const p = Math.min((ts-ts0)/900, 1);\n          const e = 1-Math.pow(1-p,3);\n          el.style.strokeDasharray = (tgt*e).toFixed(2)+' '+RING_CIRC.toFixed(2);\n          if(lblEl) lblEl.textContent = Math.round(tgtVal*e);\n          if(p<1) requestAnimationFrame(anim);\n        })(ts0);\n      });\n    }, i*80);\n  });\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// VERSE OF THE DAY (rotates through pool by date)\n// ═══════════════════════════════════════════════════════════════════\nfunction renderVOTD(){\n  const idx = (new Date().getDate()-1) % VERSES_POOL.length;\n  const v = VERSES_POOL[idx];\n  document.getElementById('votd-verse').textContent = `\"${v.text}\"`;\n  document.getElementById('votd-ref').textContent = v.ref;\n  document.getElementById('snap-verse-ref').textContent = v.ref;\n  document.getElementById('snap-verse-txt').textContent = `\"${v.text}\"`;\n  // already-saved indicator\n  const isSaved = state.verses.some(sv => sv.ref === v.ref);\n  document.getElementById('votd-save').textContent = isSaved ? '❤️' : '🤍';\n}\nfunction saveVOTD(){\n  const idx = (new Date().getDate()-1) % VERSES_POOL.length;\n  const v = VERSES_POOL[idx];\n  const exists = state.verses.find(sv => sv.ref === v.ref);\n  if(exists){\n    state.verses = state.verses.filter(sv => sv.ref !== v.ref);\n  } else {\n    state.verses.push({id:uid(), ref:v.ref, text:`\"${v.text}\"`});\n  }\n  persist();\n  renderVerses();\n  renderVOTD();\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// DATE LABEL\n// ═══════════════════════════════════════════════════════════════════\nfunction renderDate(){\n  const d = new Date();\n  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];\n  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];\n  document.getElementById('today-date-label').textContent = `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// STREAK + PRAYER MIN\n// ═══════════════════════════════════════════════════════════════════\nfunction renderStreakAndPrayer(){\n  document.getElementById('snap-streak').textContent = state.streak;\n  document.getElementById('spirit-streak-big').textContent = state.streak;\n  document.getElementById('profile-streak').textContent = state.streak;\n  document.getElementById('snap-prayer-min').textContent = state.prayerMin;\n  document.getElementById('prayer-cur').textContent = state.prayerMin;\n  document.getElementById('prayer-goal-num').textContent = state.prayerGoal;\n  const ARC_FULL = 150;\n  const ratio = Math.min(state.prayerMin/state.prayerGoal, 1);\n  document.getElementById('prayer-arc-fill').setAttribute('stroke-dasharray', `${(ARC_FULL*ratio).toFixed(1)} 175.9`);\n  document.getElementById('prayer-arc-text').textContent = state.prayerMin;\n  document.getElementById('member-since').textContent = state.memberSince;\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// MORNING CHECK-IN\n// ═══════════════════════════════════════════════════════════════════\nlet ciStep = 1;\nfunction buildProg(){\n  const p = document.getElementById('modal-prog');\n  p.innerHTML = '';\n  for(let i=1;i<=6;i++){\n    const d = document.createElement('div');\n    d.className = 'mpd' + (i===ciStep?' cur':i<ciStep?' done':'');\n    p.appendChild(d);\n  }\n  document.getElementById('ci-back').style.visibility = ciStep>1 ? 'visible' : 'hidden';\n}\nfunction openCheckin(){\n  ciStep = 1;\n  document.querySelectorAll('.ci-step').forEach(s=>s.classList.remove('active'));\n  document.getElementById('ci-1').classList.add('active');\n  buildProg();\n  document.getElementById('ci-modal').classList.add('open');\n}\nfunction closeCheckin(){ document.getElementById('ci-modal').classList.remove('open'); }\nfunction nextStep(n){\n  document.getElementById('ci-'+ciStep).classList.remove('active');\n  ciStep = n;\n  document.getElementById('ci-'+ciStep).classList.add('active');\n  buildProg();\n}\nfunction prevStep(){\n  if(ciStep<=1) return;\n  document.getElementById('ci-'+ciStep).classList.remove('active');\n  ciStep--;\n  document.getElementById('ci-'+ciStep).classList.add('active');\n  buildProg();\n}\nfunction selMin(btn){\n  btn.closest('.ci-mins-row').querySelectorAll('.ci-min-btn').forEach(b=>b.classList.remove('sel'));\n  btn.classList.add('sel');\n  document.getElementById('ci-custom-wrap').style.display = 'none';\n}\nfunction showCustomMin(btn){\n  btn.closest('.ci-mins-row').querySelectorAll('.ci-min-btn').forEach(b=>b.classList.remove('sel'));\n  btn.classList.add('sel');\n  document.getElementById('ci-custom-wrap').style.display='block';\n  document.getElementById('ci-custom-val').focus();\n}\nfunction toggleSw(sw){ sw.classList.toggle('on'); }\n\nfunction submitCheckin(){\n  const selectedMin = document.querySelector('#ci-mins-row .ci-min-btn.sel');\n  let goal = 10;\n  if(selectedMin){\n    if(selectedMin.id === 'ci-custom-chip'){\n      const cv = parseInt(document.getElementById('ci-custom-val').value);\n      if(!isNaN(cv) && cv>0) goal = cv;\n    } else {\n      goal = parseInt(selectedMin.dataset.min) || 10;\n    }\n  }\n  state.prayerGoal = goal;\n\n  const p1 = document.getElementById('ci-p1').value.trim();\n  const p2 = document.getElementById('ci-p2').value.trim();\n  const p3 = document.getElementById('ci-p3').value.trim();\n  if(p1 || p2 || p3){\n    state.priorities = [p1, p2, p3].map((t,i) => t || state.priorities[i] || '');\n    state.priorityChecks = [false, false, false];\n  }\n\n  const scriptureOn = document.getElementById('ci-scripture-sw').classList.contains('on');\n  // mirror to first discipline matching \"Scripture\" if exists\n  const scripDisc = state.disciplines.find(d => /scripture/i.test(d.title));\n  if(scripDisc) scripDisc.on = scriptureOn;\n  // and first non-neg matching \"Word\" if exists\n  if(scriptureOn){\n    const wordNN = state.nonneg.find(n => /word/i.test(n.text));\n    if(wordNN) wordNN.done = true;\n  }\n\n  const today = todayStr();\n  if(state.lastCheckin !== today){\n    state.streak = state.lastCheckin === yesterdayStr() ? (state.streak+1) : 1;\n    state.lastCheckin = today;\n  }\n  persist();\n  renderAll();\n  closeCheckin();\n\n  const f = document.createElement('div');\n  f.style.cssText = 'position:absolute;inset:0;background:rgba(39,174,96,0.13);border-radius:47px;z-index:300;display:flex;align-items:center;justify-content:center;pointer-events:none;animation:fo 1.4s ease forwards;';\n  f.innerHTML = '<div style=\"text-align:center;\"><div style=\"font-size:52px;margin-bottom:10px;\">✓<\u002Fdiv><div style=\"font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:800;color:#27AE60;text-transform:uppercase;letter-spacing:2px;\">Check-in complete<\u002Fdiv><\u002Fdiv>';\n  document.querySelector('.phone-screen').appendChild(f);\n  setTimeout(()=>f.remove(), 1500);\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// AI PRAYER PROMPT\n// ═══════════════════════════════════════════════════════════════════\nasync function getAIPrayerPrompt(){\n  const btn = document.getElementById('ai-prayer-btn');\n  const txt = document.getElementById('ai-prayer-text');\n  btn.textContent = 'Loading...';\n  btn.disabled = true;\n  try{\n    const reply = await window.claude.complete({\n      system: 'You are a faith companion. Return a single, specific, personal prayer prompt in 2-3 sentences. No intro. No sign-off. Themes: consistency, purpose, fatherhood, gratitude, discipline.',\n      messages: [{role:'user', content:'Give me a prayer prompt for today.'}]\n    });\n    txt.textContent = (reply || '').trim() || 'Lord, show me one area today where I can be more faithful than yesterday.';\n    txt.classList.add('shown');\n    btn.textContent = 'Another →';\n  } catch(e){\n    txt.textContent = 'Lord, show me one area today where I can be more faithful than yesterday.';\n    txt.classList.add('shown');\n    btn.textContent = 'Try again →';\n  }\n  btn.disabled = false;\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// JOURNAL: prayers + answered\n// ═══════════════════════════════════════════════════════════════════\nfunction fmtDate(d){\n  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n  return `${months[d.getMonth()]} ${d.getDate()}`;\n}\nfunction diffDays(aMs, bMs){\n  return Math.max(1, Math.round((bMs-aMs)/86400000));\n}\nfunction renderPrayers(){\n  const wrap = document.getElementById('prayer-list');\n  wrap.innerHTML = '';\n  const active   = state.prayers.filter(p=>p.status==='active').sort((a,b)=>(b.dateMs||0)-(a.dateMs||0));\n  const answered = state.prayers.filter(p=>p.status==='answered').sort((a,b)=>(b.dateMs||0)-(a.dateMs||0));\n  const ordered  = [...active, ...answered];\n  if(!ordered.length){\n    wrap.innerHTML = '<div class=\"empty-msg\">No prayers yet. The first step of trust is naming what you can\\'t carry.<\u002Fdiv>';\n    return;\n  }\n  ordered.forEach(p => {\n    const div = document.createElement('div');\n    div.className = 'prayer-entry';\n    if(p.status === 'answered'){\n      div.innerHTML = `\n        <div class=\"pe-header\"><div class=\"pe-date\">${p.date}<\u002Fdiv><div class=\"pe-status answered\">✓ Answered<\u002Fdiv><\u002Fdiv>\n        <div class=\"pe-text\">${escapeHtml(p.text)}<\u002Fdiv>\n        <div class=\"pe-answered-note\">\n          <div class=\"pe-answered-lbl\">Answered · ${escapeHtml(p.answeredDate || '')}<\u002Fdiv>\n          <div class=\"pe-answered-text\">${escapeHtml(p.answeredText || '')}<\u002Fdiv>\n        <\u002Fdiv>`;\n    } else {\n      div.innerHTML = `\n        <div class=\"pe-header\"><div class=\"pe-date\">${p.date}<\u002Fdiv><div class=\"pe-status active-p\">Active<\u002Fdiv><\u002Fdiv>\n        <div class=\"pe-text\">${escapeHtml(p.text)}<\u002Fdiv>\n        <button class=\"pe-mark-btn\" onclick=\"openAnsweredModal('${p.id}')\">Mark Answered<\u002Fbutton>`;\n    }\n    wrap.appendChild(div);\n  });\n}\nfunction renderAnswered(){\n  const wrap = document.getElementById('answered-list');\n  wrap.innerHTML = '';\n  const answered = state.prayers.filter(p=>p.status==='answered').sort((a,b)=>(b.answeredMs||0)-(a.answeredMs||0));\n  if(!answered.length){\n    wrap.innerHTML = '<div class=\"empty-msg\">No answered prayers logged yet.<br>Mark one as answered to start your wall.<\u002Fdiv>';\n    return;\n  }\n  answered.forEach(p => {\n    const days = (p.dateMs && p.answeredMs) ? diffDays(p.dateMs, p.answeredMs) : null;\n    const div = document.createElement('div');\n    div.className = 'answered-entry';\n    div.innerHTML = `\n      <div class=\"ae-date-range\">${escapeHtml(p.date)} → ${escapeHtml(p.answeredDate || '')}${days?(' · '+days+' days'):''}<\u002Fdiv>\n      <div class=\"ae-prayer\">\"${escapeHtml(p.text)}\"<\u002Fdiv>\n      <div class=\"ae-answer-lbl\">He answered<\u002Fdiv>\n      <div class=\"ae-answer-text\">${escapeHtml(p.answeredText || '')}<\u002Fdiv>`;\n    wrap.appendChild(div);\n  });\n}\nfunction escapeHtml(s){ return (s||'').replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c])); }\n\nfunction openAddPrayer(){\n  document.getElementById('new-prayer-text').value = '';\n  document.getElementById('prayer-modal').classList.add('open');\n  setTimeout(()=>document.getElementById('new-prayer-text').focus(), 200);\n}\nfunction closeAddPrayer(){ document.getElementById('prayer-modal').classList.remove('open'); }\nfunction savePrayer(){\n  const text = document.getElementById('new-prayer-text').value.trim();\n  if(!text){ document.getElementById('new-prayer-text').focus(); return; }\n  const now = new Date();\n  state.prayers.push({\n    id: 'p'+Date.now(),\n    text,\n    date: fmtDate(now),\n    dateMs: now.getTime(),\n    status: 'active'\n  });\n  persist();\n  renderPrayers();\n  closeAddPrayer();\n}\n\nlet pendingAnsweredId = null;\nfunction openAnsweredModal(id){\n  pendingAnsweredId = id;\n  const p = state.prayers.find(x=>x.id===id);\n  if(!p) return;\n  document.getElementById('answered-orig-prayer').textContent = '\"'+p.text+'\"';\n  document.getElementById('answer-text').value = '';\n  document.getElementById('answered-modal').classList.add('open');\n  setTimeout(()=>document.getElementById('answer-text').focus(), 200);\n}\nfunction closeAnsweredModal(){ document.getElementById('answered-modal').classList.remove('open'); pendingAnsweredId = null; }\nfunction confirmAnswered(){\n  if(!pendingAnsweredId) return;\n  const text = document.getElementById('answer-text').value.trim();\n  if(!text){ document.getElementById('answer-text').focus(); return; }\n  const p = state.prayers.find(x=>x.id===pendingAnsweredId);\n  if(p){\n    const now = new Date();\n    p.status = 'answered';\n    p.answeredText = text;\n    p.answeredDate = fmtDate(now);\n    p.answeredMs = now.getTime();\n  }\n  persist();\n  renderPrayers();\n  renderAnswered();\n  closeAnsweredModal();\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// TIMELINE EXPAND\n// ═══════════════════════════════════════════════════════════════════\nfunction tlExpand(el){\n  const full = el.getAttribute('data-full');\n  if(el.hasAttribute('data-expanded')){\n    el.removeAttribute('data-expanded');\n    el.innerHTML = full.slice(0,60)+'…<span class=\"tl-more\"> Read more<\u002Fspan>';\n  } else {\n    el.setAttribute('data-expanded','1');\n    el.innerHTML = full;\n  }\n}\n\n// ═══════════════════════════════════════════════════════════════════\n// MASTER RENDER\n// ═══════════════════════════════════════════════════════════════════\nfunction renderAll(){\n  renderDate();\n  renderVOTD();\n  renderPriorities();\n  renderNonneg();\n  renderDisciplines();\n  renderVerses();\n  renderStreakAndPrayer();\n  renderWhoop();\n  renderPrayers();\n  renderAnswered();\n  animateRings();\n}\n\n// ESC closes modals\ndocument.addEventListener('keydown', e => {\n  if(e.key==='Escape'){\n    closeCheckin();\n    closeItemModal();\n    closeAddPrayer();\n    closeAnsweredModal();\n  }\n});\n\n// boot\nrenderAll();\nconst lastTab = ls.get('ff_tab', 'today');\nif(lastTab && lastTab !== 'today'){\n  const btn = document.querySelector(`.tab[data-tab=\"${lastTab}\"]`);\n  if(btn) switchTab(lastTab, btn);\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
