[build]
  command = ""
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/whoop-auth"
  to = "/.netlify/functions/whoop-auth"
  status = 200

[[redirects]]
  from = "/webhook/terra"
  to = "/.netlify/functions/terra-webhook"
  status = 200

[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
